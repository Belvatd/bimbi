version: "3.9"

services:
  chromadb:
    image: chromadb/chroma:latest
    container_name: bimbi-chromadb
    ports:
      - "8001:8000"
    volumes:
      - ./chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: bimbi-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bimbi-backend
    ports:
      - "${PORT}:${PORT}"
    environment:
      PORT: ${PORT}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      CHROMADB_URL: http://chromadb:8000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    restart: unless-stopped

  ingester:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bimbi-ingester
    command: [ "./ingester" ]
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      CHROMADB_URL: http://chromadb:8000
    depends_on:
      chromadb:
        condition: service_started
    restart: "no"

  mathesar:
    image: mathesar/mathesar:latest
    container_name: bimbi-mathesar
    ports:
      - "8002:8000"
    environment:
      POSTGRES_DB: ${MATHESAR_DB_NAME}
      POSTGRES_USER: ${MATHESAR_DB_USER}
      POSTGRES_PASSWORD: ${MATHESAR_DB_PASSWORD}
      POSTGRES_HOST: mathesar-db
      POSTGRES_PORT: 5432
      DJANGO_SETTINGS_MODULE: config.settings.production
      ALLOWED_HOSTS: "*"
      DEBUG: "false"
      SECRET_KEY: ${MATHESAR_SECRET_KEY}
    volumes:
      - mathesar_static:/code/static
      - mathesar_media:/code/.media
      - mathesar_secrets:/code/.secrets
    depends_on:
      mathesar-db:
        condition: service_healthy
    restart: unless-stopped

  mathesar-db:
    image: postgres:15-alpine
    container_name: bimbi-mathesar-db
    environment:
      POSTGRES_DB: ${MATHESAR_DB_NAME}
      POSTGRES_USER: ${MATHESAR_DB_USER}
      POSTGRES_PASSWORD: ${MATHESAR_DB_PASSWORD}
    volumes:
      - mathesar_db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${MATHESAR_DB_USER} -d ${MATHESAR_DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  mathesar_db_data:
  mathesar_static:
  mathesar_media:
  mathesar_secrets:

